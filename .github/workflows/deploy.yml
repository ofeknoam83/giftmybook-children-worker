name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: gen-lang-client-0521120270
  REGION: europe-west1
  SERVICE: giftmybook-children-worker
  REPOSITORY: giftmybook-children-worker

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch the last few commits so scripts/captureCommits.js can record
          # the last 3 subjects into commits.json before the image is built.
          fetch-depth: 10

      - name: Capture last 3 commits
        run: node scripts/captureCommits.js

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify required secrets are present
        # PR AA-1 (post silent-fallback incident): refuse to deploy if any
        # of the keys the runtime depends on are empty/unset, instead of
        # shipping a revision that silently degrades to Gemini.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GOOGLE_AI_STUDIO_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
        run: |
          missing=()
          [ -z "$OPENAI_API_KEY" ] && missing+=(OPENAI_API_KEY)
          [ -z "$GOOGLE_AI_STUDIO_KEY" ] && missing+=(GOOGLE_AI_STUDIO_KEY)
          [ -z "$GEMINI_API_KEY_1" ] && missing+=(GEMINI_API_KEY_1)
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Required secrets are empty/unset: ${missing[*]}. Set them in repo Settings → Secrets → Actions and re-run."
            exit 1
          fi
          echo "✅ All required secrets present (OPENAI_API_KEY length: ${#OPENAI_API_KEY})"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source . \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --no-invoker-iam-check \
            --memory=16Gi \
            --cpu=4 \
            --timeout=3600 \
            --concurrency=1 \
            --min-instances=0 \
            --max-instances=10 \
            --execution-environment=gen2 \
            --cpu-boost \
            --no-cpu-throttling \
            --update-env-vars="GOOGLE_AI_STUDIO_KEY=${{ secrets.GOOGLE_AI_STUDIO_KEY }},GEMINI_PROXY_URL=${{ secrets.GEMINI_PROXY_URL }},GEMINI_PROXY_API_KEY=${{ secrets.GEMINI_PROXY_API_KEY }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},GEMINI_API_KEY_1=${{ secrets.GEMINI_API_KEY_1 }},GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2 }},GEMINI_API_KEY_3=${{ secrets.GEMINI_API_KEY_3 }},GEMINI_API_KEY_4=${{ secrets.GEMINI_API_KEY_4 }},USE_CHAT_ILLUSTRATIONS=true" \
            --quiet

      - name: Route all traffic to latest
        run: |
          gcloud run services update-traffic ${{ env.SERVICE }} \
            --to-latest \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }}

      - name: Clean up old revisions
        run: |
          # Keep only the active revision, delete all others
          OLD_REVISIONS=$(gcloud run revisions list \
            --service ${{ env.SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --format="value(name)" | tail -n +2)
          
          if [ -n "$OLD_REVISIONS" ]; then
            echo "Deleting old revisions..."
            echo "$OLD_REVISIONS" | while read -r rev; do
              echo "  Deleting $rev"
              gcloud run revisions delete "$rev" \
                --project ${{ env.PROJECT_ID }} \
                --region ${{ env.REGION }} \
                --quiet || true
            done
          else
            echo "No old revisions to clean up"
          fi

      - name: Verify deployment
        run: |
          ACTIVE=$(gcloud run revisions list \
            --service ${{ env.SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --filter="status.conditions.type=Active AND status.conditions.status=True" \
            --format="value(name)" \
            --limit=1)
          echo "✅ Active revision: $ACTIVE"

      - name: Probe /healthz on the new revision
        # PR AA-1: refuse to call the deploy successful if /healthz returns
        # 503 (which means OPENAI_API_KEY is missing/empty in the running
        # container even though the deploy command appeared to succeed).
        #
        # WIF credentials cannot mint identity tokens via
        # `gcloud auth print-identity-token` (no refresh token), so we use
        # the IAM credentials API with the workload SA as the impersonation
        # target and our own URL as the audience.
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          SA='${{ secrets.WIF_SERVICE_ACCOUNT }}'
          TOKEN=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{\"audience\":\"$URL\",\"includeEmail\":true}" \
            "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/$SA:generateIdToken" \
            | python3 -c 'import sys,json;print(json.load(sys.stdin)["token"])')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "None" ]; then
            echo "::error::Failed to mint identity token for healthz probe — cannot verify deploy."
            exit 1
          fi
          echo "Probing $URL/healthz"
          STATUS=$(curl -s -o /tmp/healthz.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "$URL/healthz" || echo "000")
          echo "healthz status: $STATUS"
          cat /tmp/healthz.json || true
          echo
          if [ "$STATUS" != "200" ]; then
            echo "::error::/healthz returned $STATUS — the new revision is degraded (likely missing OPENAI_API_KEY). Failing the deploy."
            exit 1
          fi

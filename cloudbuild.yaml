steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/giftmybook-children-worker', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/giftmybook-children-worker']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - giftmybook-children-worker
      - --image=gcr.io/$PROJECT_ID/giftmybook-children-worker
      - --region=europe-west1
      - --platform=managed
      - --memory=8Gi
      - --cpu=4
      - --timeout=3600
      - --concurrency=1
      - --min-instances=1
      - --max-instances=20
      - --execution-environment=gen2
      - --cpu-boost
      - --no-cpu-throttling
      - --no-allow-unauthenticated

images:
  - 'gcr.io/$PROJECT_ID/giftmybook-children-worker'
